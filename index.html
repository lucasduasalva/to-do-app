<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }

    form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    label {
      font-weight: bold;
    }

    input, select {
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
      width: 320px;
    }

    li {
      background: #f9f9f9;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-text {
      flex: 1;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .btn-complete {
      margin-left: 10px;
      padding: 5px 8px;
      cursor: pointer;
    }

    .prioridade-alta {
      border-left: 5px solid #e74c3c;
    }

    .prioridade-media {
      border-left: 5px solid #f39c12;
    }

    .prioridade-baixa {
      border-left: 5px solid #2ecc71;
    }
  </style>
</head>
<body>

  <form id="task-form">
    <label for="task-input">Tarefa:</label>
    <input 
      type="text" 
      id="task-input" 
      placeholder="Digite uma tarefa..." 
      required
    >

    <label for="priority">Prioridade:</label>
    <select id="priority" required>
      <option value="">Selecione</option>
      <option value="alta">Alta</option>
      <option value="media">Média</option>
      <option value="baixa">Baixa</option>
    </select>

    <button type="submit">Adicionar</button>
  </form>

  <ul id="task-list"></ul>

  <script>
    const form = document.getElementById("task-form");
    const input = document.getElementById("task-input");
    const priority = document.getElementById("priority");
    const list = document.getElementById("task-list");

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      adicionarTarefa(input.value, priority.value);

      input.value = "";
      priority.value = "";
    });

    function adicionarTarefa(texto, prioridade) {
      const li = document.createElement("li");

      const span = document.createElement("span");
      span.classList.add("task-text");
      span.textContent = texto + " (" + prioridade + ")";

      const btn = document.createElement("button");
      btn.classList.add("btn-complete");
      btn.textContent = "Concluir";

      btn.addEventListener("click", function() {
        span.classList.toggle("completed");
      });

      const mapaPrioridade = {
        alta: "prioridade-alta",
        media: "prioridade-media",
        baixa: "prioridade-baixa"
      };

      if (mapaPrioridade[prioridade]) {
        li.classList.add(mapaPrioridade[prioridade]);
      }

      li.appendChild(span);
      li.appendChild(btn);

      list.appendChild(li);
    }
  </script>

</body>
</html>
